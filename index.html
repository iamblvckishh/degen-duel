<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL| THE ARENA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #ffffff; --black: #000000; --lime: #00FF19; --yellow: #FFFF00; --red: #FF3131; --shadow: 10px 10px 0px 0px var(--black); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 440px; padding: 20px; }
        .card { background: #fff; border: 5px solid var(--black); padding: 30px; box-shadow: var(--shadow); display: none; }
        .card.active { display: block; }
        h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 20px; line-height: 0.9; }
        .stake-option { display: flex; justify-content: space-between; align-items: center; border: 5px solid var(--black); padding: 15px; margin-bottom: 12px; cursor: pointer; background: #fff; transition: 0.1s; }
        .stake-option:hover { background: var(--lime); transform: translate(-3px, -3px); box-shadow: 5px 5px 0px var(--black); }
        .btn { width: 100%; padding: 15px; border: 5px solid var(--black); background: var(--yellow); font-weight: bold; cursor: pointer; box-shadow: 5px 5px 0px var(--black); margin-bottom: 10px; }
        .btn-withdraw { background: var(--red); color: white; display: none; margin-top: 20px; font-size: 0.8rem; }
        .radar-box { background: #000; color: var(--lime); padding: 15px; font-size: 0.65rem; word-break: break-all; margin: 15px 0; border: 2px dashed var(--lime); cursor: copy; }
        .status-msg { text-align: center; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        .blinking { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card active" id="step-stake">
        <h1>THE ARENA</h1>
        <div class="stake-option" onclick="pickStake(1)"><span>$1 USDC</span> <span style="font-size:0.6rem;">READY</span></div>
        <div class="stake-option" onclick="pickStake(10)"><span>$10 USDC</span> <span style="font-size:0.6rem;">HOT</span></div>
        <div class="stake-option" onclick="pickStake(100)"><span>$100 USDC</span> <span style="font-size:0.6rem;">DEGEN</span></div>
    </div>

    <div class="card" id="step-radar">
        <h1 id="reveal-amt">$0 DUEL</h1>
        <p style="font-size:0.7rem;">SENDER: <span id="display-sender" style="color:blue;">DETECTING...</span></p>
        <p style="font-size:0.6rem; margin-top:15px; opacity:0.7;">SEND USDC TO CONTRACT:</p>
        <div class="radar-box" onclick="copyArena()">0x9AC6D3b25F65BA7109c520D78842BD7588486C86</div>
        <div id="radar-status" class="status-msg blinking">RADAR SCANNING BLOCKCHAIN...</div>
        
        <button id="withdraw-btn" class="btn btn-withdraw" onclick="doWithdraw()">ONE-CLICK WITHDRAW</button>
        
        <button class="btn" style="margin-top:20px; background:#fff;" onclick="location.reload()">← ABANDON SCAN</button>
    </div>
</div>

<script>
    const ARENA = "0x9AC6D3b25F65BA7109c520D78842BD7588486C86";
    const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";
    const RPC = "https://rpc.ankr.com/eth_sepolia";
    const provider = new ethers.providers.JsonRpcProvider(RPC);

    let selectedStake = 0;
    let userAddr = "";

    function navTo(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function pickStake(amt) {
        selectedStake = amt;
        document.getElementById('reveal-amt').innerText = `$${amt} DUEL`;
        navTo('step-radar');
        startRadar();
    }

    async function startRadar() {
        const usdcContract = new ethers.Contract(USDC, ["event Transfer(address indexed from, address indexed to, uint256 value)"], provider);
        const filter = usdcContract.filters.Transfer(null, ARENA);
        
        usdcContract.on(filter, (from, to, value) => {
            const expectedValue = ethers.utils.parseUnits(selectedStake.toString(), 6);
            if (value.eq(expectedValue)) {
                userAddr = from;
                document.getElementById('display-sender').innerText = from.substring(0,10) + "...";
                checkLobbyStatus();
            }
        });
    }

    async function checkLobbyStatus() {
        const arenaContract = new ethers.Contract(ARENA, [
            "function pendingBets(uint256) view returns (address)",
            "event BetResolved(address indexed winner, address indexed loser, uint256 amount)"
        ], provider);

        const valInWei = ethers.utils.parseUnits(selectedStake.toString(), 6);
        const pendingPlayer = await arenaContract.pendingBets(valInWei);
        
        if (pendingPlayer.toLowerCase() === userAddr.toLowerCase()) {
            document.getElementById('radar-status').innerText = "YOU ARE IN LOBBY. WAITING FOR MATCH...";
            document.getElementById('withdraw-btn').style.display = "block";
        }

        arenaContract.on("BetResolved", (winner, loser) => {
            if (winner.toLowerCase() === userAddr.toLowerCase()) alert("VICTORY! FUNDS SENT.");
            if (loser.toLowerCase() === userAddr.toLowerCase()) alert("DEFEAT.");
            location.reload();
        });
    }

    async function doWithdraw() {
        if (!window.ethereum) return alert("Install MetaMask");
        
        try {
            const browserProvider = new ethers.providers.Web3Provider(window.ethereum);
            await browserProvider.send("eth_requestAccounts", []);
            const signer = browserProvider.getSigner();
            
            const arenaWithSigner = new ethers.Contract(ARENA, [
                "function cancelBet(uint256 amount)"
            ], signer);

            const valInWei = ethers.utils.parseUnits(selectedStake.toString(), 6);
            const tx = await arenaWithSigner.cancelBet(valInWei);
            document.getElementById('radar-status').innerText = "WITHDRAWING...";
            await tx.wait();
            alert("STAKE RETURNED!");
            location.reload();
        } catch (err) {
            alert("WITHDRAWAL FAILED: " + err.reason);
        }
    }

    function copyArena() {
        navigator.clipboard.writeText(ARENA);
        alert("CONTRACT COPIED");
    }
</script>
</body>
</html>
