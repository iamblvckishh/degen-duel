<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APE ARENA | 0x0eCe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #ffffff; --black: #000000; --lime: #00FF19; --yellow: #FFFF00; --red: #FF3131; --shadow: 10px 10px 0px 0px var(--black); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: #fff; border: 5px solid var(--black); padding: 30px; box-shadow: var(--shadow); display: none; }
        .card.active { display: block; }
        h1 { font-size: 2.2rem; letter-spacing: -2px; margin-bottom: 20px; line-height: 0.9; }
        .stake-option { display: flex; justify-content: space-between; align-items: center; border: 5px solid var(--black); padding: 15px; margin-bottom: 12px; cursor: pointer; background: #fff; transition: 0.1s; }
        .stake-option:hover { background: var(--lime); transform: translate(-3px, -3px); box-shadow: 5px 5px 0px var(--black); }
        .btn { width: 100%; padding: 15px; border: 5px solid var(--black); background: var(--yellow); font-weight: bold; cursor: pointer; box-shadow: 5px 5px 0px var(--black); margin-bottom: 10px; }
        .btn-withdraw { background: var(--red); color: white; display: none; margin-top: 20px; font-size: 0.8rem; }
        .radar-box { background: #000; color: var(--lime); padding: 15px; font-size: 0.6rem; word-break: break-all; margin: 15px 0; border: 2px dashed var(--lime); cursor: copy; text-align: center; }
        .status-msg { text-align: center; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
        .blinking { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card active" id="step-stake">
        <h1>APE ARENA</h1>
        <p style="font-size: 0.7rem; margin-bottom: 15px;">SELECT STAKE & SEND ETH</p>
        <div class="stake-option" onclick="pickStake('0.01')"><span>0.01 ETH</span> <span style="font-size:0.5rem;">READY</span></div>
        <div class="stake-option" onclick="pickStake('0.05')"><span>0.05 ETH</span> <span style="font-size:0.5rem;">HOT</span></div>
        <div class="stake-option" onclick="pickStake('0.1')"><span>0.10 ETH</span> <span style="font-size:0.5rem;">DEGEN</span></div>
    </div>

    <div class="card" id="step-radar">
        <h1 id="reveal-amt">0.00 ETH</h1>
        <p style="font-size:0.6rem; opacity:0.7;">SEND ETH TO CONTRACT:</p>
        <div class="radar-box" id="contract-display" onclick="copyArena()">0x0eCe574a7C864c554A7AB98E8F2620bECBE952cd</div>
        
        <div id="radar-status" class="status-msg blinking">SCANNING BLOCKCHAIN...</div>
        
        <button id="withdraw-btn" class="btn btn-withdraw" onclick="doWithdraw()">CANCEL & REFUND</button>
        <button class="btn" style="margin-top:20px; background:#fff;" onclick="location.reload()">← BACK</button>
    </div>
</div>

<script>
    const ARENA_ADDR = "0x0eCe574a7C864c554A7AB98E8F2620bECBE952cd";
    const RPC = "https://rpc.ankr.com/eth_sepolia";
    const provider = new ethers.providers.JsonRpcProvider(RPC);

    let selectedStake = "0";
    let lobbyWatcher = null;

    function navTo(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function pickStake(amt) {
        selectedStake = amt;
        document.getElementById('reveal-amt').innerText = `${amt} ETH DUEL`;
        navTo('step-radar');
        startRadar();
    }

    async function startRadar() {
        const statusMsg = document.getElementById('radar-status');
        const arenaContract = new ethers.Contract(ARENA_ADDR, [
            "function pendingBets(uint256) view returns (address)",
            "event BetResolved(address indexed winner, address indexed loser, uint256 amount)"
        ], provider);

        const stakeWei = ethers.utils.parseEther(selectedStake);

        const checkLobby = async () => {
            try {
                const player = await arenaContract.pendingBets(stakeWei);
                if (player !== ethers.constants.AddressZero) {
                    statusMsg.innerText = `PLAYER IN LOBBY: ${player.substring(0,8)}...`;
                    statusMsg.style.color = "#000";
                    // If user has MetaMask, check if they are the one in lobby
                    if (window.ethereum && window.ethereum.selectedAddress) {
                        if (player.toLowerCase() === window.ethereum.selectedAddress.toLowerCase()) {
                            document.getElementById('withdraw-btn').style.display = 'block';
                            statusMsg.innerText = "YOU ARE IN THE LOBBY. WAITING...";
                        }
                    }
                } else {
                    statusMsg.innerText = "LOBBY EMPTY. SEND ETH TO JOIN.";
                    statusMsg.style.color = "#666";
                }
            } catch (e) { console.error("Radar Error", e); }
        };

        checkLobby();
        lobbyWatcher = setInterval(checkLobby, 4000);

        arenaContract.on("BetResolved", (winner, loser, amount) => {
            if (amount.eq(stakeWei)) {
                clearInterval(lobbyWatcher);
                alert(`DUEL COMPLETE!\nWINNER: ${winner}`);
                location.reload();
            }
        });
    }

    async function doWithdraw() {
        if (!window.ethereum) return alert("Connect Wallet for Refund");
        const browserProvider = new ethers.providers.Web3Provider(window.ethereum);
        await browserProvider.send("eth_requestAccounts", []);
        const signer = browserProvider.getSigner();
        const contract = new ethers.Contract(ARENA_ADDR, ["function cancelBet(uint256 amount)"], signer);
        try {
            const tx = await contract.cancelBet(ethers.utils.parseEther(selectedStake));
            await tx.wait();
            alert("STAKE RETURNED!");
            location.reload();
        } catch (e) { alert("ERROR: Check if you are the current lobby holder."); }
    }

    function copyArena() {
        navigator.clipboard.writeText(ARENA_ADDR);
        alert("ADDRESS COPIED");
    }
</script>
</body>
</html>
