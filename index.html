<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN FLIP | SEPOLIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --black: #000000; --purple: #BC00FF;
            --lime: #00FF19; --yellow: #FFFF00;
            --shadow: 8px 8px 0px 0px #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bg); padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border: 5px solid var(--black); padding: 30px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .btn { background: var(--yellow); border: 4px solid var(--black); padding: 15px; cursor: pointer; width: 100%; font-size: 1.2rem; box-shadow: 4px 4px 0px 0px #000; margin-bottom: 10px; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .power-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        #status-log { background: #000; color: var(--lime); padding: 15px; font-family: monospace; font-size: 0.8rem; height: 120px; overflow-y: auto; border: 4px solid var(--black); }
        
        /* New Lobby UI */
        #lobby-view { 
            display: none; background: var(--lime); border: 4px solid var(--black); 
            padding: 20px; margin-top: 15px; text-align: center; color: black;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>DEGEN P2P FLIP</h1>
        <p style="font-size: 0.8rem; margin-bottom: 20px;">NETWORK: SEPOLIA</p>
        <button class="btn" id="connect-btn" onclick="connect()">CONNECT WALLET</button>
    </div>

    <div class="card" style="background: var(--purple); color: white;">
        <h2 style="margin-bottom: 15px;">STAKE USDC</h2>
        <div class="power-grid">
            <button class="btn" onclick="play(1)">$1 USDC</button>
            <button class="btn" onclick="play(10)">$10 USDC</button>
            <button class="btn" onclick="play(100)">$100 USDC</button>
            <button class="btn" onclick="play(1000)">$1K USDC</button>
        </div>
        
        <div id="lobby-view">
            <h3 id="lobby-text">WAITING FOR MATCH...</h3>
            <button class="btn" style="background: white; margin-top: 10px;" onclick="cancel()">QUIT & REFUND</button>
        </div>
    </div>

    <div id="status-log">>> READY. CONNECT TO START.</div>
</div>

<script>
    // --- CONFIG ---
    const CONTRACT_ADDRESS = "0xe3e5Cf7764536a3E2c935078433DD5A7D8e72b43".toLowerCase(); 
    const USDC_ADDRESS = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238".toLowerCase();

    let signer, duelContract, usdcContract, currentStakeRaw;

    // YOUR ORIGINAL WORKING CONNECT LOGIC
    async function connect() {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        
        const { chainId } = await provider.getNetwork();
        if (chainId !== 11155111) {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0xaa36a7' }], 
            });
            location.reload();
            return;
        }

        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        
        document.getElementById('connect-btn').innerText = addr.substring(0,6) + "...";
        document.getElementById('connect-btn').style.background = "#00FF19"; // Lime
        
        // Setup Contracts
        duelContract = new ethers.Contract(CONTRACT_ADDRESS, [
            "function enterFiftyFifty(uint256 _amount) external",
            "function cancelFlip(uint256 _amount) external",
            "event FlipResult(address indexed winner, address indexed loser, uint256 prize)"
        ], signer);

        usdcContract = new ethers.Contract(USDC_ADDRESS, [
            "function approve(address s, uint256 a) returns (bool)",
            "function allowance(address o, address s) view returns (uint256)"
        ], signer);
        
        updateLog(">> CONNECTED TO SEPOLIA");

        // Listen for wins globally
        duelContract.on("FlipResult", (winner) => {
            if(winner.toLowerCase() === addr.toLowerCase()) {
                updateLog(">> YOU WON! CHECK YOUR WALLET.");
            } else {
                updateLog(">> MATCH COMPLETED (NOT YOU).");
            }
            document.getElementById('lobby-view').style.display = 'none';
        });
    }

    // UPDATED PLAY LOGIC FOR P2P
    async function play(amount) {
        if (!signer) return alert("Connect first");
        currentStakeRaw = ethers.utils.parseUnits(amount.toString(), 6);
        
        try {
            updateLog(`>> PREPARING $${amount} STAKE...`);
            const userAddr = await signer.getAddress();
            
            // Approval check
            const allowance = await usdcContract.allowance(userAddr, CONTRACT_ADDRESS);
            if (allowance.lt(currentStakeRaw)) {
                updateLog(">> APPROVING USDC (WAITING FOR CONFIRMATION)...");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait();
                updateLog(">> APPROVED.");
            }

            updateLog(">> JOINING LOBBY (SIGN IN METAMASK)...");
            const txS = await duelContract.enterFiftyFifty(currentStakeRaw);
            await txS.wait();
            
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('lobby-text').innerText = `IN $${amount} LOBBY...`;
            updateLog(`>> SUCCESSFULLY JOINED $${amount} LOBBY.`);
        } catch (e) {
            updateLog("!! ERROR: " + (e.reason || "FAILED"));
        }
    }

    async function cancel() {
        if (!currentStakeRaw) return;
        try {
            updateLog(">> REQUESTING REFUND...");
            const tx = await duelContract.cancelFlip(currentStakeRaw);
            await tx.wait();
            document.getElementById('lobby-view').style.display = 'none';
            updateLog(">> REFUND SUCCESSFUL.");
        } catch (e) {
            updateLog("!! CANCEL FAILED");
        }
    }

    function updateLog(msg) { document.getElementById('status-log').innerText += "\n" + msg; }
</script>
</body>
</html>
