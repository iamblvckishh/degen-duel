<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | SHAPE TESTNET</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #ffffff;
            --main-black: #000000;
            --spice-purple: #BC00FF;
            --spice-lime: #00FF19;
            --spice-red: #FF3131;
            --spice-blue: #00E0FF;
            --spice-yellow: #FFFF00;
            --brutal-shadow: 10px 10px 0px 0px #000000;
            --small-shadow: 4px 4px 0px 0px #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--main-black) 1px, transparent 0);
            background-size: 25px 25px;
            color: var(--main-black);
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: var(--main-black); color: white; padding: 30px;
            border: 6px solid var(--main-black); box-shadow: var(--brutal-shadow);
            margin-bottom: 40px; display: flex; justify-content: space-between;
            align-items: center; transform: rotate(-0.5deg);
        }

        .logo-text { font-size: 3.5rem; letter-spacing: -3px; text-transform: uppercase; font-style: italic; }

        .balance-box {
            background: var(--spice-yellow); color: black; padding: 10px 20px;
            border: 4px solid black; box-shadow: var(--small-shadow);
            font-size: 1.2rem; cursor: pointer;
        }

        .nav-tabs { display: flex; gap: 15px; margin-bottom: 30px; }

        .tab {
            flex: 1; padding: 20px; background: white; border: 5px solid black;
            box-shadow: var(--brutal-shadow); cursor: pointer; font-size: 1.2rem;
            text-transform: uppercase; transition: 0.1s;
        }

        .tab.active { background: var(--spice-purple); color: white; transform: translate(6px, 6px); box-shadow: none; }

        .card { background: white; border: 6px solid var(--main-black); padding: 30px; box-shadow: var(--brutal-shadow); margin-bottom: 30px; }
        .game-view { display: none; }
        .game-view.active { display: block; }

        .rps-arena { background: var(--spice-lime); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 30px; border: 6px solid black; margin-top: 20px; }
        .choice-btn { background: white; border: 4px solid black; font-size: 4rem; padding: 20px; cursor: pointer; box-shadow: var(--small-shadow); transition: 0.1s; }
        .choice-btn:active { transform: translate(4px, 4px); box-shadow: none; }

        .power-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .power-btn { background: white; border: 6px solid black; padding: 20px 10px; text-align: center; box-shadow: var(--brutal-shadow); cursor: pointer; font-size: 1.5rem; }
        .power-btn:hover { background: var(--spice-yellow); }

        .degen-input { width: 100%; padding: 15px; border: 4px solid black; font-size: 1.2rem; outline: none; margin: 10px 0; }
        .degen-input:focus { background: var(--spice-yellow); }

        .label { background: black; color: white; padding: 4px 10px; font-size: 0.8rem; display: inline-block; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        #status-log { 
            background: #eee; border: 4px solid black; padding: 10px; margin-top: 10px; 
            font-family: monospace; font-size: 0.8rem; height: 60px; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">DEGEN<br>DUEL</div>
        <div class="balance-box" id="auth-btn" onclick="handleAuth()">CONNECT WALLET</div>
    </header>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('rps-view', this)">🪨 ROCK-PAPER-SCISSORS</button>
        <button class="tab" onclick="switchTab('flip-view', this)">🎲 50/50 DOUBLE</button>
    </div>

    <div id="rps-view" class="game-view active">
        <div class="card">
            <span class="label">SET THE STAGE</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                <div>
                    <p style="font-size: 0.8rem;">OPPONENT ADDRESS</p>
                    <input type="text" class="degen-input" id="rps-user" placeholder="0x...">
                </div>
                <div>
                    <p style="font-size: 0.8rem;">DUEL STAKE (USDC)</p>
                    <input type="number" class="degen-input" id="rps-stake" placeholder="0.00">
                </div>
            </div>
        </div>
        <div class="rps-arena">
            <div id="rps-pot-display" style="grid-column: span 3; text-align: center; background: black; color: white; padding: 10px; margin-bottom: 10px;">PRIZE POT: 0.00 USDC (5% FEE)</div>
            <button class="choice-btn" onclick="playRPS(1)">🪨</button>
            <button class="choice-btn" onclick="playRPS(2)">📄</button>
            <button class="choice-btn" onclick="playRPS(3)">✂️</button>
        </div>
    </div>

    <div id="flip-view" class="game-view">
        <div class="card" style="background: var(--spice-purple); color: white;">
            <h2 style="font-size: 3rem; letter-spacing: -2px;">50/50 FLIP</h2>
            <p id="match-status" class="blink">SCANNING SHAPE TESTNET...</p>
            <div class="power-grid">
                <div class="power-btn" id="btn-1" style="color: black;" onclick="enterFlip(1)">$1</div>
                <div class="power-btn" id="btn-10" style="color: black;" onclick="enterFlip(10)">$10</div>
                <div class="power-btn" id="btn-100" style="color: black;" onclick="enterFlip(100)">$100</div>
                <div class="power-btn" id="btn-1000" style="color: black;" onclick="enterFlip(1000)">$1K</div>
            </div>
        </div>
    </div>
    
    <div id="status-log">>> READY TO DEGEN. CONNECT WALLET TO START.</div>
</div>

<script>
    // --- CONFIGURATION ---
    const CONTRACT_ADDRESS = "PASTE_YOUR_DEPLOYED_CONTRACT_ADDRESS"; 
    const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e";

    const ABI = [
        "function enterFiftyFifty(uint256 _amount) external",
        "function createRPSDuel(address _opponent, uint256 _stake, bytes32 _moveHash) external",
        "event FlipResult(address indexed winner, address indexed loser, uint256 prize)"
    ];

    const USDC_ABI = [
        "function approve(address spender, uint256 amount) returns (bool)",
        "function allowance(address owner, address spender) view returns (uint256)"
    ];

    let signer, duelContract, usdcContract;

    // --- AUTH & NETWORK ---
    async function handleAuth() {
        if (!window.ethereum) return alert("MetaMask not found!");
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            
            document.getElementById('auth-btn').innerText = addr.substring(0,6) + "..." + addr.substring(38);
            document.getElementById('status-log').innerText = ">> WALLET CONNECTED. SHAPE SEPOLIA ACTIVE.";
            
            duelContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);

            // Listen for Flip Results
            duelContract.on("FlipResult", (winner, loser, prize) => {
                if(winner.toLowerCase() === addr.toLowerCase()) {
                    updateStatus("🏆 YOU WON! PRIZE SENT TO WALLET.");
                } else {
                    updateStatus("💀 YOU LOST. RE-UP AND TRY AGAIN.");
                }
            });
        } catch (e) {
            updateStatus(">> AUTH ERROR: " + e.message);
        }
    }

    // --- GAME LOGIC ---
    async function enterFlip(amount) {
        if (!signer) return alert("Connect Wallet First!");
        try {
            const amountInUnits = ethers.utils.parseUnits(amount.toString(), 6);
            const userAddr = await signer.getAddress();

            updateStatus(`>> CHECKING ALLOWANCE FOR $${amount}...`);
            const allowance = await usdcContract.allowance(userAddr, CONTRACT_ADDRESS);

            if (allowance.lt(amountInUnits)) {
                updateStatus(">> APPROVING USDC... CONFIRM IN WALLET.");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait();
            }

            updateStatus(">> SENDING STAKE TO SHAPE...");
            const txS = await duelContract.enterFiftyFifty(amountInUnits);
            await txS.wait();
            updateStatus(">> STAKE CONFIRMED. WAITING FOR MATCH...");
        } catch (e) {
            updateStatus(">> ERROR: " + e.message.substring(0, 40));
        }
    }

    async function playRPS(moveIndex) {
        if (!signer) return alert("Connect Wallet First!");
        const opponent = document.getElementById('rps-user').value;
        const stakeAmount = document.getElementById('rps-stake').value;

        if (!opponent || !stakeAmount) return alert("Set Opponent and Stake!");

        try {
            const stakeInUnits = ethers.utils.parseUnits(stakeAmount.toString(), 6);
            
            // Generate a simple move hash (move + secret salt)
            const salt = ethers.utils.hexlify(ethers.utils.randomBytes(32));
            const moveHash = ethers.utils.keccak256(ethers.utils.solidityPack(["uint8", "bytes32"], [moveIndex, salt]));

            updateStatus(">> INITIATING RPS DUEL...");
            const tx = await duelContract.createRPSDuel(opponent, stakeInUnits, moveHash);
            await tx.wait();
            updateStatus(">> DUEL CREATED. OPPONENT MUST NOW COMMIT.");
            
            // In a real app, you'd save the 'salt' to localStorage to reveal later
            console.log("Your Secret Salt (Save this!):", salt);

        } catch (e) {
            updateStatus(">> RPS ERROR: " + e.message.substring(0, 40));
        }
    }

    // --- UI HELPERS ---
    function switchTab(viewId, el) {
        document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    function updateStatus(msg) {
        document.getElementById('status-log').innerText = msg;
    }
</script>
</body>
</html>
