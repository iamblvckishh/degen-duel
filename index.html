<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN FLIP | SEPOLIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --black: #000000; --purple: #BC00FF;
            --lime: #00FF19; --yellow: #FFFF00;
            --shadow: 8px 8px 0px 0px #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bg); padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border: 5px solid var(--black); padding: 30px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .btn { background: var(--yellow); border: 4px solid var(--black); padding: 15px; cursor: pointer; width: 100%; font-size: 1.2rem; box-shadow: 4px 4px 0px 0px #000; margin-bottom: 10px; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .power-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        #status-log { background: #000; color: var(--lime); padding: 15px; font-family: monospace; font-size: 0.8rem; height: 100px; overflow-y: auto; border: 4px solid var(--black); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>DEGEN FLIP</h1>
        <p style="font-size: 0.8rem; margin-bottom: 20px;">NETWORK: SEPOLIA</p>
        <button class="btn" id="connect-btn" onclick="connect()">CONNECT WALLET</button>
    </div>

    <div class="card" style="background: var(--purple); color: white;">
        <h2 style="margin-bottom: 15px;">STAKE USDC</h2>
        <div class="power-grid">
            <button class="btn" onclick="play(1)">$1 USDC</button>
            <button class="btn" onclick="play(5)">$5 USDC</button>
        </div>
    </div>

    <div id="status-log">>> READY. CONNECT TO START.</div>
</div>

<script>
    // --- UPDATED ADDRESSES ---
    const CONTRACT_ADDRESS = "0x49E12f7b1E95081E847C7fA2bB72123BABEdDdf8".toLowerCase(); 
    const USDC_ADDRESS = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238".toLowerCase();

    let signer, duelContract, usdcContract;

    async function connect() {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        
        const { chainId } = await provider.getNetwork();
        if (chainId !== 11155111) {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0xaa36a7' }], 
            });
            location.reload();
            return;
        }

        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        
        document.getElementById('connect-btn').innerText = addr.substring(0,6) + "...";
        
        duelContract = new ethers.Contract(CONTRACT_ADDRESS, ["function enterFiftyFifty(uint256 _amount) external"], signer);
        usdcContract = new ethers.Contract(USDC_ADDRESS, [
            "function approve(address s, uint256 a) returns (bool)",
            "function allowance(address o, address s) view returns (uint256)"
        ], signer);
        
        updateLog(">> CONNECTED TO SEPOLIA");
    }

    async function play(amount) {
        if (!signer) return alert("Connect first");
        try {
            const val = ethers.utils.parseUnits(amount.toString(), 6);
            updateLog(">> CHECKING ALLOWANCE...");
            
            const allowance = await usdcContract.allowance(await signer.getAddress(), CONTRACT_ADDRESS);
            if (allowance.lt(val)) {
                updateLog(">> APPROVING USDC...");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait();
            }

            updateLog(">> FLIPPING...");
            const txS = await duelContract.enterFiftyFifty(val);
            await txS.wait();
            updateLog(">> TX CONFIRMED! CHECK WALLET FOR WINNINGS.");
        } catch (e) {
            updateLog("!! ERROR: " + (e.reason || "FAILED"));
        }
    }

    function updateLog(msg) { document.getElementById('status-log').innerText = msg; }
</script>
</body>
</html>
