<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | MONO-SPICE EDITION</title>
    <style>
        :root {
            --bg: #ffffff;
            --main-black: #000000;
            --spice-purple: #BC00FF;
            --spice-lime: #00FF19;
            --spice-red: #FF3131;
            --spice-blue: #00E0FF;
            --spice-yellow: #FFFF00;
            --brutal-shadow: 10px 10px 0px 0px #000000;
            --small-shadow: 4px 4px 0px 0px #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--main-black) 1px, transparent 0);
            background-size: 25px 25px;
            color: var(--main-black);
            padding: 20px;
            line-height: 1.1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- HEADER & STATS --- */
        header {
            background: var(--main-black);
            color: white;
            padding: 30px;
            border: 6px solid var(--main-black);
            box-shadow: var(--brutal-shadow);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: rotate(-0.5deg);
        }

        .logo-text {
            font-size: 3.5rem;
            letter-spacing: -3px;
            text-transform: uppercase;
            font-style: italic;
        }

        .balance-box {
            background: var(--spice-yellow);
            color: black;
            padding: 10px 20px;
            border: 4px solid black;
            box-shadow: var(--small-shadow);
            font-size: 1.2rem;
        }

        /* --- NAVIGATION --- */
        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 20px;
            background: white;
            border: 5px solid black;
            box-shadow: var(--brutal-shadow);
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: 0.1s;
        }

        .tab.active {
            background: var(--spice-purple);
            color: white;
            transform: translate(6px, 6px);
            box-shadow: none;
        }

        /* --- CARDS & GAMEPLAY --- */
        .card {
            background: white;
            border: 6px solid var(--main-black);
            padding: 30px;
            box-shadow: var(--brutal-shadow);
            margin-bottom: 30px;
        }

        .game-view { display: none; }
        .game-view.active { display: block; }

        /* RPS Specifics */
        .rps-arena {
            background: var(--spice-lime);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            padding: 30px;
            border: 6px solid black;
            margin-top: 20px;
        }

        .choice-btn {
            background: white;
            border: 4px solid black;
            font-size: 4rem;
            padding: 20px;
            cursor: pointer;
            box-shadow: var(--small-shadow);
            transition: 0.1s;
        }

        .choice-btn:hover { background: var(--spice-blue); }
        .choice-btn:active { transform: translate(4px, 4px); box-shadow: none; }

        /* 50/50 Specifics */
        .power-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .power-btn {
            background: white;
            border: 6px solid black;
            padding: 20px 10px;
            text-align: center;
            box-shadow: var(--brutal-shadow);
            cursor: pointer;
            transition: 0.1s;
        }

        .power-btn:hover { background: var(--spice-red); color: white; }
        .power-btn:active { transform: translate(8px, 8px); box-shadow: none; }

        /* --- CARNAGE (HISTORY) --- */
        .carnage-trigger {
            width: 100%;
            background: white;
            border: 6px solid black;
            padding: 25px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: var(--brutal-shadow);
            margin-top: 20px;
            text-transform: uppercase;
        }

        .carnage-trigger:hover { background: var(--main-black); color: white; }

        #carnage-list {
            display: none;
            background: white;
            border: 6px solid black;
            margin-top: 10px;
            padding: 20px;
            box-shadow: var(--brutal-shadow);
        }

        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 6px solid black; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 2px solid black; font-family: monospace; font-weight: bold; }

        /* --- INPUTS --- */
        .degen-input {
            width: 100%;
            padding: 15px;
            border: 4px solid black;
            font-size: 1.2rem;
            outline: none;
            margin: 10px 0;
            background: white;
        }

        .degen-input:focus {
            background: var(--spice-yellow);
        }

        .label {
            background: black;
            color: white;
            padding: 4px 10px;
            font-size: 0.8rem;
            display: inline-block;
        }

        .custom-stake-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">DEGEN<br>DUEL</div>
        <div class="balance-box">4,200.00 USDC</div>
    </header>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('rps-view', this)">🪨 ROCK-PAPER-SCISSORS</button>
        <button class="tab" onclick="switchTab('flip-view', this)">🎲 50/50 DOUBLE</button>
    </div>

    <div id="rps-view" class="game-view active">
        <div class="card">
            <span class="label">SET THE STAGE</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                <div>
                    <p style="font-size: 0.8rem;">OPPONENT USERNAME</p>
                    <input type="text" class="degen-input" id="rps-user" placeholder="SEARCH...">
                </div>
                <div>
                    <p style="font-size: 0.8rem;">DUEL STAKE (USDC)</p>
                    <input type="number" class="degen-input" id="rps-stake" placeholder="0.00" oninput="updatePotDisplay()">
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="document.getElementById('rps-user').value='Vitalik'" style="background:var(--spice-blue); padding:5px 15px; border:2px solid black; cursor:pointer;">@Vitalik</button>
                <button onclick="document.getElementById('rps-user').value='Anon_Deg3n'" style="background:var(--spice-lime); padding:5px 15px; border:2px solid black; cursor:pointer;">@Anon_Deg3n</button>
            </div>
        </div>

        <div class="rps-arena">
            <div id="rps-pot-display" style="grid-column: span 3; text-align: center; background: black; color: white; padding: 10px; margin-bottom: 10px;">
                PRIZE POT: 0.00 USDC (5% FEE APPLIED)
            </div>
            <button class="choice-btn" onclick="playRPS('ROCK')">🪨</button>
            <button class="choice-btn" onclick="playRPS('PAPER')">📄</button>
            <button class="choice-btn" onclick="playRPS('SCISSORS')">✂️</button>
        </div>
    </div>

    <div id="flip-view" class="game-view">
        <div class="card" style="background: var(--spice-purple); color: white; border-radius: 0;">
            <h2 style="font-size: 3rem; letter-spacing: -2px;">50/50 FLIP</h2>
            <p>INSTANT MATCHING. POWERS OF 10 ONLY.</p>
            
            <div class="power-grid">
                <div class="power-btn" style="color: black;" onclick="enterFlip(1)">
                    <h2 style="font-size: 1.5rem;">$1</h2>
                </div>
                <div class="power-btn" style="color: black; background: var(--spice-yellow);" onclick="enterFlip(10)">
                    <h2 style="font-size: 1.5rem;">$10</h2>
                </div>
                <div class="power-btn" style="color: black;" onclick="enterFlip(100)">
                    <h2 style="font-size: 1.5rem;">$100</h2>
                </div>
                <div class="power-btn" style="color: black; background: var(--spice-blue);" onclick="enterFlip(1000)">
                    <h2 style="font-size: 1.5rem;">$1K</h2>
                </div>
            </div>

            <div class="card" style="background: white; color: black; box-shadow: var(--small-shadow); padding: 15px;">
                <p style="font-size: 0.8rem; margin-bottom: 5px;">CUSTOM POWER OF 10</p>
                <div class="custom-stake-box">
                    <input type="number" id="custom-flip" class="degen-input" style="margin:0;" placeholder="10000...">
                    <button onclick="handleCustomFlip()" style="background:var(--spice-lime); border:4px solid black; padding: 15px; font-weight: 900; cursor: pointer;">STAKE</button>
                </div>
            </div>
        </div>

        <div id="waiting-area" class="card" style="display:none; text-align: center; border-style: dashed; background: #fff5f5;">
            <h2 id="wait-msg" style="color: var(--spice-red); font-size: 1.5rem;">MATCHING DEPOSIT...</h2>
            <button class="carnage-trigger" style="font-size: 1rem; padding: 10px; background: var(--spice-yellow);" onclick="cancelFlip()">CANCEL & REFUND</button>
        </div>
    </div>

    <button class="carnage-trigger" onclick="toggleCarnage()">View Recent Carnage ↓</button>
    <div id="carnage-list">
        <table>
            <thead>
                <tr>
                    <th>GAME</th>
                    <th>WINNER</th>
                    <th>POT (USDC)</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>50/50</td><td>@MoonBoY</td><td style="color:var(--spice-purple)">$19.00</td></tr>
                <tr><td>RPS</td><td>@Chad_42</td><td style="color:var(--spice-purple)">$190.00</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function switchTab(viewId, el) {
        document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    function toggleCarnage() {
        const list = document.getElementById('carnage-list');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    /* RPS LOGIC */
    function updatePotDisplay() {
        const stake = document.getElementById('rps-stake').value || 0;
        const netPot = (stake * 2 * 0.95).toFixed(2);
        document.getElementById('rps-pot-display').innerText = `PRIZE POT: ${netPot} USDC (5% FEE APPLIED)`;
    }

    function playRPS(move) {
        const user = document.getElementById('rps-user').value;
        const stake = document.getElementById('rps-stake').value;
        if(!user || !stake || stake <= 0) {
            alert("ENTER OPPONENT AND STAKE FIRST!");
            return;
        }
        alert(`DUEL INITIATED vs ${user} for ${stake} USDC! Move Locked: ${move}`);
    }

    /* FLIP LOGIC */
    function isPowerOfTen(n) {
        if (n <= 0) return false;
        let log = Math.log10(n);
        return log === Math.floor(log);
    }

    function handleCustomFlip() {
        const val = parseFloat(document.getElementById('custom-flip').value);
        if(isPowerOfTen(val)) {
            enterFlip(val);
        } else {
            alert("ERROR: YOU MUST ENTER A POWER OF 10 (1, 10, 100, 1000, 10000...)");
        }
    }

    function enterFlip(amt) {
        document.getElementById('waiting-area').style.display = 'block';
        document.getElementById('wait-msg').innerText = "LOCKED $" + amt + ". WAITING FOR CHALLENGER...";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function cancelFlip() {
        document.getElementById('waiting-area').style.display = 'none';
        alert("STAKE RETURNED TO WALLET.");
    }
</script>

</body>
</html>
