<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | NE-BRUTALIST</title>
    <style>
        :root {
            --bg-yellow: #FFDE00;
            --card-pink: #FF80BF;
            --card-green: #00FF41;
            --card-blue: #00D1FF;
            --black: #000000;
            --shadow: 8px 8px 0px 0px #000000;
            --shadow-small: 4px 4px 0px 0px #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-yellow);
            color: var(--black);
            padding: 20px;
        }

        /* Layout */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background: white;
            border: 4px solid var(--black);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        /* Navigation */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 4px solid var(--black);
            background: white;
            cursor: pointer;
            box-shadow: var(--shadow-small);
            transition: all 0.1s;
        }

        .tab-btn.active {
            background: var(--card-blue);
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* Game Sections */
        .game-area {
            display: none;
        }

        .game-area.active {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        /* Neo-Brutalist Components */
        .card {
            background: white;
            border: 4px solid var(--black);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: 4px solid var(--black);
            margin-top: 10px;
            font-size: 1rem;
            outline: none;
        }

        .btn-action {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            background: var(--card-green);
            border: 4px solid var(--black);
            font-weight: 900;
            cursor: pointer;
            box-shadow: var(--shadow-small);
        }

        .btn-action:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* RPS Specifics */
        .rps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .rps-choice {
            font-size: 3rem;
            padding: 20px;
            background: white;
            border: 4px solid var(--black);
            box-shadow: var(--shadow-small);
            cursor: pointer;
        }

        /* 50/50 Specifics */
        .fifty-fifty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            grid-column: span 2;
        }

        .power-card {
            background: var(--card-pink);
            padding: 30px 10px;
            text-align: center;
            border: 4px solid var(--black);
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .prize-banner {
            background: var(--black);
            color: white;
            padding: 10px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">DEGEN.APP</div>
        <div style="font-weight: bold; border-left: 4px solid black; padding-left: 15px;">
            BALANCE: <span style="color: #ff00ff">2,500 USDC</span>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('rps')">ROCK-PAPER-DUEL</button>
        <button class="tab-btn" onclick="switchTab('flip')">50/50 DOUBLE UP</button>
    </div>

    <div id="rps" class="game-area active">
        <div class="card">
            <h3 style="text-decoration: underline;">1. FIND VICTIM</h3>
            <input type="text" class="search-input" placeholder="Enter username...">
            <div style="margin-top: 20px;">
                <p>RECENT OPPONENTS:</p>
                <div style="border: 2px solid black; padding: 5px; margin-top: 5px;">@Vitalik_Fan</div>
                <div style="border: 2px solid black; padding: 5px; margin-top: 5px;">@MoonBoy88</div>
            </div>
        </div>

        <div class="card" style="background-color: var(--card-blue);">
            <h2 style="text-align: center; font-size: 1.5rem;">BEST OF 3 CHALLENGE</h2>
            <div class="prize-banner">POT: 20 USDC (95% Payout)</div>
            
            <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                <div style="text-align: center;">YOU<br><span style="font-size: 2rem;">?</span></div>
                <div style="font-size: 2rem; font-weight: 900;">VS</div>
                <div style="text-align: center;">THEM<br><span style="font-size: 2rem;">?</span></div>
            </div>

            <div class="rps-grid">
                <button class="rps-choice" onclick="selectRPS('rock')">🪨</button>
                <button class="rps-choice" onclick="selectRPS('paper')">📄</button>
                <button class="rps-choice" onclick="selectRPS('scissors')">✂️</button>
            </div>
        </div>
    </div>

    <div id="flip" class="game-area">
        <div class="fifty-fifty-grid">
            <div class="power-card" onclick="deposit(1)">
                <div style="font-size: 1.2rem;">DEPOSIT</div>
                <div style="font-size: 2.5rem; font-weight: 900;">1</div>
                <div>USDC</div>
            </div>
            <div class="power-card" style="background: var(--card-green);" onclick="deposit(10)">
                <div style="font-size: 1.2rem;">DEPOSIT</div>
                <div style="font-size: 2.5rem; font-weight: 900;">10</div>
                <div>USDC</div>
            </div>
            <div class="power-card" style="background: white;" onclick="deposit(100)">
                <div style="font-size: 1.2rem;">DEPOSIT</div>
                <div style="font-size: 2.5rem; font-weight: 900;">100</div>
                <div>USDC</div>
            </div>
            
            <div class="card" style="grid-column: span 3; margin-top: 20px; background: #eee;">
                <h3>WAITING ROOM</h3>
                <p id="status-msg">No active deposits. Choose a power of 10 to start.</p>
                <button id="withdraw-btn" class="btn-action" style="display: none; background: #ff4d4d;">WITHDRAW FUNDS</button>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        // Toggle Buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // Toggle Views
        document.querySelectorAll('.game-area').forEach(view => view.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
    }

    function selectRPS(choice) {
        alert("You selected " + choice.toUpperCase() + ". Waiting for opponent to join and stake...");
    }

    function deposit(amt) {
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('withdraw-btn');
        
        msg.innerText = "LOCKED: " + amt + " USDC in contract. Waiting for a challenger to send " + amt + " USDC...";
        msg.style.color = "red";
        msg.style.fontWeight = "bold";
        btn.style.display = "block";
    }
</script>

</body>
</html>
