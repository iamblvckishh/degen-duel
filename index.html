<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DegenDuel | Shape Sepolia</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #0a0a0a;
            --card-bg: #151515;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--neon-green); font-size: 3rem; margin-bottom: 10px; }

        .game-container {
            background: var(--card-bg);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .stake-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        #status-box {
            margin-top: 25px;
            padding: 10px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #888;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid #333;
            border-top: 3px solid var(--neon-green);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>DEGEN DUEL</h1>
        <p>Double your USDC on Shape Sepolia</p>
    </div>

    <div class="game-container">
        <h2 id="wallet-status">Please Connect Wallet</h2>
        <button id="auth-btn" onclick="connectWallet()">CONNECT WALLET</button>

        <div id="game-ui" style="display: none; margin-top: 20px;">
            <h3>SELECT STAKE (USDC)</h3>
            <div class="stake-grid">
                <button onclick="handleStake(1)">$1</button>
                <button onclick="handleStake(10)">$10</button>
                <button onclick="handleStake(100)">$100</button>
                <button onclick="handleStake(1000)">$1000</button>
            </div>
            <div class="loader" id="loader"></div>
            <div id="status-box">Ready for Duel</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CONTRACT_ADDRESS = "YOUR_DEPLOYED_CONTRACT_ADDRESS"; // <--- PASTE YOUR REMIX ADDRESS HERE
        const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e"; 
        
        const ABI = [
            "function enterFiftyFifty(uint256 _amount) external",
            "event FlipResult(address indexed winner, address indexed loser, uint256 prize)"
        ];

        const USDC_ABI = [
            "function approve(address spender, uint256 amount) returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)",
            "function balanceOf(address account) view returns (uint256)"
        ];

        let provider, signer, degenContract, usdcContract;

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();
                    
                    document.getElementById('wallet-status').innerText = `Wallet: ${address.substring(0,6)}...${address.substring(38)}`;
                    document.getElementById('auth-btn').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';

                    setupContracts();
                } catch (err) {
                    alert("Connection failed");
                }
            } else {
                alert("Please install MetaMask!");
            }
        }

        function setupContracts() {
            degenContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
            
            // Listen for Wins/Losses live
            degenContract.on("FlipResult", (winner, loser, prize) => {
                const userAddr = document.getElementById('wallet-status').innerText;
                if(winner.toLowerCase().includes(userAddr.substring(0,5).toLowerCase())) {
                    updateStatus("🏆 YOU WON! Prize sent to wallet.");
                } else {
                    updateStatus("💀 YOU LOST. Better luck next time.");
                }
            });
        }

        async function handleStake(amount) {
            const amountInUnits = ethers.utils.parseUnits(amount.toString(), 6);
            const loader = document.getElementById('loader');
            
            try {
                updateStatus("Checking USDC balance...");
                loader.style.display = 'block';

                // 1. Check Allowance
                const userAddress = await signer.getAddress();
                const allowance = await usdcContract.allowance(userAddress, CONTRACT_ADDRESS);

                if (allowance.lt(amountInUnits)) {
                    updateStatus("Approving USDC... Please confirm in wallet.");
                    const approveTx = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                    await approveTx.wait();
                }

                // 2. Execute Stake
                updateStatus(`Staking $${amount}... Please confirm transaction.`);
                const tx = await degenContract.enterFiftyFifty(amountInUnits);
                updateStatus("Transaction pending... Waiting for block.");
                await tx.wait();

                updateStatus("Staked! Waiting for an opponent to join...");
                loader.style.display = 'none';

            } catch (err) {
                console.error(err);
                updateStatus("Transaction Error. Check console.");
                loader.style.display = 'none';
            }
        }

        function updateStatus(msg) {
            document.getElementById('status-box').innerText = msg;
        }
    </script>
</body>
</html>
