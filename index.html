<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | SHAPE TESTNET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --main-black: #000000; --spice-purple: #BC00FF;
            --spice-lime: #00FF19; --spice-yellow: #FFFF00;
            --brutal-shadow: 10px 10px 0px 0px #000000;
            --small-shadow: 4px 4px 0px 0px #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bg); background-image: radial-gradient(var(--main-black) 1px, transparent 0); background-size: 25px 25px; color: var(--main-black); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { background: var(--main-black); color: white; padding: 30px; border: 6px solid var(--main-black); box-shadow: var(--brutal-shadow); margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 3.5rem; letter-spacing: -3px; text-transform: uppercase; font-style: italic; }
        .balance-box { background: var(--spice-yellow); color: black; padding: 10px 20px; border: 4px solid black; box-shadow: var(--small-shadow); font-size: 1.2rem; cursor: pointer; }
        .nav-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab { flex: 1; padding: 20px; background: white; border: 5px solid black; box-shadow: var(--brutal-shadow); cursor: pointer; font-size: 1.2rem; text-transform: uppercase; }
        .tab.active { background: var(--spice-purple); color: white; transform: translate(6px, 6px); box-shadow: none; }
        .card { background: white; border: 6px solid var(--main-black); padding: 30px; box-shadow: var(--brutal-shadow); margin-bottom: 30px; }
        .game-view { display: none; }
        .game-view.active { display: block; }
        .rps-arena { background: var(--spice-lime); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 30px; border: 6px solid black; margin-top: 20px; }
        .choice-btn { background: white; border: 4px solid black; font-size: 4rem; padding: 20px; cursor: pointer; box-shadow: var(--small-shadow); transition: 0.1s; }
        .choice-btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .power-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .power-btn { background: white; border: 6px solid black; padding: 20px 10px; text-align: center; box-shadow: var(--brutal-shadow); cursor: pointer; font-size: 1.5rem; }
        .degen-input { width: 100%; padding: 15px; border: 4px solid black; font-size: 1.2rem; outline: none; margin: 10px 0; }
        .label { background: black; color: white; padding: 4px 10px; font-size: 0.8rem; display: inline-block; }
        #status-log { background: #eee; border: 4px solid black; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 0.8rem; height: 80px; overflow-y: auto; color: black; }
        .confirm-btn { background: var(--main-black); color: white; width: 100%; padding: 15px; border: none; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">DEGEN<br>DUEL</div>
        <div class="balance-box" id="auth-btn" onclick="handleAuth()">CONNECT WALLET</div>
    </header>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('rps-view', this)">🪨 ROCK-PAPER-SCISSORS</button>
        <button class="tab" onclick="switchTab('flip-view', this)">🎲 50/50 DOUBLE</button>
    </div>

    <div id="rps-view" class="game-view active">
        <div class="card">
            <span class="label">SET THE STAGE</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                <div><p style="font-size: 0.8rem;">OPPONENT ADDRESS</p><input type="text" class="degen-input" id="rps-user" placeholder="0x..."></div>
                <div><p style="font-size: 0.8rem;">DUEL STAKE (USDC)</p><input type="number" class="degen-input" id="rps-stake" placeholder="0.00"></div>
            </div>
            <button class="confirm-btn" onclick="updateStatus('>> SETUP READY. NOW PICK A MOVE BELOW.')">CONFIRM SETTINGS</button>
        </div>
        <div class="rps-arena">
            <div id="rps-pot-display" style="grid-column: span 3; text-align: center; background: black; color: white; padding: 10px; margin-bottom: 10px;">PICK YOUR MOVE</div>
            <button class="choice-btn" onclick="playRPS(1)">🪨</button>
            <button class="choice-btn" onclick="playRPS(2)">📄</button>
            <button class="choice-btn" onclick="playRPS(3)">✂️</button>
        </div>
    </div>

    <div id="flip-view" class="game-view">
        <div class="card" style="background: var(--spice-purple); color: white;">
            <h2 style="font-size: 3rem; letter-spacing: -2px;">50/50 FLIP</h2>
            <div class="power-grid">
                <div class="power-btn" style="color: black;" onclick="enterFlip(1)">$1</div>
                <div class="power-btn" style="color: black;" onclick="enterFlip(10)">$10</div>
                <div class="power-btn" style="color: black;" onclick="enterFlip(100)">$100</div>
                <div class="power-btn" style="color: black;" onclick="enterFlip(1000)">$1K</div>
            </div>
        </div>
    </div>
    <div id="status-log">>> STATUS: READY. CONNECT WALLET.</div>
</div>

<script>
    // --- CONFIG ---
    const CONTRACT_ADDRESS = "0x7e26bf8670Df62e454744767CBF71261a14F9175".toLowerCase(); 
    const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e".toLowerCase();

    const ABI = [
        "function enterFiftyFifty(uint256 _amount) external", 
        "function createRPSDuel(address _opponent, uint256 _stake, bytes32 _moveHash) external"
    ];
    const USDC_ABI = [
        "function approve(address spender, uint256 amount) returns (bool)", 
        "function allowance(address owner, address spender) view returns (uint256)", 
        "function balanceOf(address account) view returns (uint256)"
    ];

    let signer, duelContract, usdcContract;

    async function handleAuth() {
        if (!window.ethereum) return alert("Install MetaMask!");
        
        try {
            updateStatus(">> REQUESTING NETWORK SWITCH...");
            
            // 1. Force network change first via window.ethereum directly
            await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                    chainId: '0x2b03', // 11011
                    chainName: 'Shape Sepolia',
                    rpcUrls: ['https://sepolia.shape.network'],
                    nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                    blockExplorerUrls: ['https://sepolia.shapescan.xyz']
                }]
            });

            // 2. NOW create the provider once the network is definitely changed
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            document.getElementById('auth-btn').innerText = addr.substring(0,6) + "...";
            
            duelContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
            
            const bal = await usdcContract.balanceOf(addr);
            updateStatus(">> CONNECTED. USDC: " + ethers.utils.formatUnits(bal, 6));
        } catch (e) { 
            console.error(e);
            updateStatus(">> AUTH FAILED: REFRESH AND TRY AGAIN"); 
        }
    }

    async function enterFlip(amount) {
        if (!signer) return alert("Connect Wallet!");
        try {
            const amountInUnits = ethers.utils.parseUnits(amount.toString(), 6);
            const userAddr = await signer.getAddress();
            
            updateStatus(">> CHECKING ALLOWANCE...");
            const allowance = await usdcContract.allowance(userAddr, CONTRACT_ADDRESS);

            if (allowance.lt(amountInUnits)) {
                updateStatus(">> APPROVING USDC...");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait();
                updateStatus(">> APPROVED! NOW STAKING...");
            }

            updateStatus(">> SENDING STAKE...");
            const txS = await duelContract.enterFiftyFifty(amountInUnits, { gasLimit: 250000 });
            await txS.wait();
            updateStatus(">> SUCCESS! MATCHING...");
        } catch (e) { updateStatus(">> TX ERROR: " + (e.reason || "REJECTED")); }
    }

    async function playRPS(moveIndex) {
        if (!signer) return alert("Connect Wallet!");
        const opponent = document.getElementById('rps-user').value.trim().toLowerCase();
        const stakeAmount = document.getElementById('rps-stake').value;
        if (!opponent || !stakeAmount) return alert("Fill fields!");

        try {
            const stakeInUnits = ethers.utils.parseUnits(stakeAmount.toString(), 6);
            const salt = ethers.utils.hexlify(ethers.utils.randomBytes(32));
            const moveHash = ethers.utils.keccak256(ethers.utils.solidityPack(["uint8", "bytes32"], [moveIndex, salt]));

            updateStatus(">> CHECKING RPS ALLOWANCE...");
            const allowance = await usdcContract.allowance(await signer.getAddress(), CONTRACT_ADDRESS);
            if (allowance.lt(stakeInUnits)) {
                updateStatus(">> APPROVING USDC...");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait();
            }

            updateStatus(">> CREATING RPS DUEL...");
            const tx = await duelContract.createRPSDuel(opponent, stakeInUnits, moveHash);
            await tx.wait();
            updateStatus(">> DUEL CREATED. LOG SALT: " + salt.substring(0,10));
        } catch (e) { updateStatus(">> RPS ERROR"); }
    }

    function switchTab(viewId, el) {
        document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }
    function updateStatus(msg) { document.getElementById('status-log').innerText = msg; }
</script>
</body>
</html>
