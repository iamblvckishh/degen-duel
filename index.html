<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | SHAPE TESTNET</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <script src="https://unpkg.com/@privy-io/js-sdk-core@latest/dist/privy-browser.js"></script>
    
    <style>
        :root {
            --bg: #ffffff; --main-black: #000000;
            --spice-purple: #BC00FF; --spice-lime: #00FF19;
            --spice-red: #FF3131; --spice-blue: #00E0FF;
            --spice-yellow: #FFFF00;
            --brutal-shadow: 10px 10px 0px 0px #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bg); color: var(--main-black); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: var(--main-black); color: white; padding: 30px;
            box-shadow: var(--brutal-shadow); margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .balance-box {
            background: var(--spice-yellow); color: black; padding: 10px 20px;
            border: 4px solid black; font-size: 1.2rem; cursor: pointer;
        }

        .nav-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab {
            flex: 1; padding: 20px; background: white; border: 5px solid black;
            box-shadow: var(--brutal-shadow); cursor: pointer; text-transform: uppercase;
        }
        .tab.active { background: var(--spice-purple); color: white; transform: translate(4px, 4px); box-shadow: none; }

        .card { background: white; border: 6px solid var(--main-black); padding: 30px; box-shadow: var(--brutal-shadow); margin-bottom: 30px; }
        .game-view { display: none; }
        .game-view.active { display: block; }

        .power-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .power-btn { background: white; border: 4px solid black; padding: 20px 10px; text-align: center; cursor: pointer; }

        .degen-input { width: 100%; padding: 15px; border: 4px solid black; font-size: 1.2rem; margin: 10px 0; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-size: 2rem;">DEGEN DUEL</div>
        <div class="balance-box" id="auth-btn" onclick="handleAuth()">CONNECT</div>
    </header>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('rps-view', this)">🪨 RPS DUEL</button>
        <button class="tab" onclick="switchTab('flip-view', this)">🎲 50/50 FLIP</button>
    </div>

    <div id="rps-view" class="game-view active">
        <div class="card">
            <p>OPPONENT ADDRESS</p>
            <input type="text" class="degen-input" id="rps-user" placeholder="0x...">
            <p>STAKE (USDC)</p>
            <input type="number" class="degen-input" id="rps-stake" placeholder="0.00">
            <button class="tab" style="width:100%; margin-top:10px; background:var(--spice-lime)" onclick="playRPS()">START DUEL</button>
        </div>
    </div>

    <div id="flip-view" class="game-view">
        <div class="card" style="background: var(--spice-purple); color: white;">
            <h2 style="font-size: 2.5rem;">50/50 FLIP</h2>
            <p id="match-status" class="blink">SCANNING SHAPE TESTNET...</p>
            <div class="power-grid">
                <div class="power-btn" id="btn-1" style="color:black" onclick="enterFlip(1)">$1</div>
                <div class="power-btn" id="btn-10" style="color:black" onclick="enterFlip(10)">$10</div>
                <div class="power-btn" id="btn-100" style="color:black" onclick="enterFlip(100)">$100</div>
                <div class="power-btn" id="btn-1000" style="color:black" onclick="enterFlip(1000)">$1K</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- SHAPE SEPOLIA CONFIG ---
    const SHAPE_PARAMS = {
        chainId: '0x2b03', // 11011
        chainName: 'Shape Sepolia',
        nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
        rpcUrls: ['https://sepolia.shape.network'],
        blockExplorerUrls: ['https://sepolia.shapescan.xyz']
    };

    const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e"; // Example Shape USDC
    const CONTRACT_ADDRESS = "PASTE_YOUR_DEPLOYED_CONTRACT_HERE";

    const privy = new Privy.PrivyClient({ appId: 'cmjwkpxrk027ak00cbgvqb809' });

    async function handleAuth() {
        if (!privy.authenticated) {
            await privy.login();
            await ensureNetwork();
            location.reload();
        }
    }

    async function ensureNetwork() {
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: SHAPE_PARAMS.chainId }],
            });
        } catch (e) {
            if (e.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [SHAPE_PARAMS],
                });
            }
        }
    }

    function switchTab(viewId, el) {
        document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    // Logic to check if someone is waiting
    async function checkMatches() {
        console.log("Polling Shape Testnet for matches...");
        // This will call your contract's 'waitingRoom' mapping
    }
    
    setInterval(checkMatches, 5000);
</script>
</body>
</html>
