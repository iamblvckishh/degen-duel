<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DegenDuel | Shape Sepolia</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" type="application/javascript"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #0a0a0a;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            border: 2px solid var(--neon-green);
            padding: 30px;
            background: var(--panel-bg);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 { color: var(--neon-green); font-size: 2.5rem; margin-bottom: 0; }
        .status-bar { font-size: 0.8rem; color: #666; margin-bottom: 20px; }

        .game-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .section {
            border: 1px solid #333;
            padding: 20px;
            border-radius: 5px;
        }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 10px;
            width: 100%;
            margin: 5px 0;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
        }

        #log-box {
            margin-top: 20px;
            height: 100px;
            border: 1px solid #222;
            padding: 10px;
            font-size: 0.7rem;
            overflow-y: auto;
            text-align: left;
            color: #888;
            background: #050505;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DEGEN DUEL</h1>
        <div class="status-bar">NETWORK: SHAPE SEPOLIA</div>

        <button id="connectBtn" onclick="connect()">CONNECT WALLET</button>

        <div id="mainUI" class="hidden">
            <div id="walletDisplay" style="font-size: 0.7rem; color: var(--neon-green); margin-bottom: 20px;"></div>

            <div class="game-sections">
                <div class="section">
                    <h3>50/50 COINFLIP</h3>
                    <button onclick="stake(1)">STAKE $1</button>
                    <button onclick="stake(10)">STAKE $10</button>
                    <button onclick="stake(100)">STAKE $100</button>
                </div>

                <div class="section">
                    <h3>RPS DUEL</h3>
                    <input type="text" id="oppAddr" placeholder="Opponent Addr" style="width:90%; background:#000; color:#fff; border:1px solid #333; padding:5px; margin-bottom:5px;">
                    <button onclick="createRPS()">CREATE DUEL</button>
                </div>
            </div>

            <div id="log-box">>> System ready. Waiting for user action...</div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "PASTE_YOUR_REMIX_ADDRESS_HERE";
        const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e";

        const ABI = [
            "function enterFiftyFifty(uint256 _amount) external",
            "function createRPSDuel(address _opponent, uint256 _stake, bytes32 _moveHash) external",
            "event FlipResult(address indexed winner, address indexed loser, uint256 prize)"
        ];

        const USDC_ABI = [
            "function approve(address spender, uint256 amount) returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)"
        ];

        let signer, duelContract, usdcContract;

        async function connect() {
            if (!window.ethereum) return alert("MetaMask not found");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const addr = await signer.getAddress();

            document.getElementById('walletDisplay').innerText = "ADDR: " + addr;
            document.getElementById('connectBtn').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');

            duelContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
            log("Wallet connected to Shape Sepolia.");

            // Event Listener
            duelContract.on("FlipResult", (winner, loser, prize) => {
                log(`Duel Finished! Winner: ${winner.substring(0,6)}... Prize: $${ethers.utils.formatUnits(prize, 6)}`);
            });
        }

        async function stake(amount) {
            try {
                const amountInUnits = ethers.utils.parseUnits(amount.toString(), 6);
                const userAddr = await signer.getAddress();

                log(`Checking USDC allowance for $${amount}...`);
                const allowance = await usdcContract.allowance(userAddr, CONTRACT_ADDRESS);

                if (allowance.lt(amountInUnits)) {
                    log("Requesting USDC Approval...");
                    const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                    await txA.wait();
                    log("USDC Approved.");
                }

                log("Submitting Stake to Blockchain...");
                const txS = await duelContract.enterFiftyFifty(amountInUnits);
                await txS.wait();
                log("Stake confirmed! Finding opponent...");
            } catch (e) {
                log("Error: " + e.message.substring(0, 50));
            }
        }

        async function createRPS() {
            log("RPS Move Commit initiated...");
            // Simplified RPS trigger for testing
            alert("RPS Commit Logic Active - Check console for hash generation.");
        }

        function log(msg) {
            const box = document.getElementById('log-box');
            box.innerHTML += `<br>>> ${msg}`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
