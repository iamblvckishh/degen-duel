<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | MONO-SPICE EDITION</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" type="application/javascript"></script>
    <script src="https://unpkg.com/@privy-io/js-sdk-core@latest/dist/privy-browser.js"></script>
    
    <style>
        :root {
            --bg: #ffffff;
            --main-black: #000000;
            --spice-purple: #BC00FF;
            --spice-lime: #00FF19;
            --spice-red: #FF3131;
            --spice-blue: #00E0FF;
            --spice-yellow: #FFFF00;
            --brutal-shadow: 10px 10px 0px 0px #000000;
            --small-shadow: 4px 4px 0px 0px #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(var(--main-black) 1px, transparent 0);
            background-size: 25px 25px;
            color: var(--main-black);
            padding: 20px;
            line-height: 1.1;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            background: var(--main-black);
            color: white;
            padding: 30px;
            border: 6px solid var(--main-black);
            box-shadow: var(--brutal-shadow);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: rotate(-0.5deg);
        }

        .logo-text { font-size: 3.5rem; letter-spacing: -3px; text-transform: uppercase; font-style: italic; }

        .balance-box {
            background: var(--spice-yellow);
            color: black;
            padding: 10px 20px;
            border: 4px solid black;
            box-shadow: var(--small-shadow);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .nav-tabs { display: flex; gap: 15px; margin-bottom: 30px; }

        .tab {
            flex: 1; padding: 20px; background: white; border: 5px solid black;
            box-shadow: var(--brutal-shadow); cursor: pointer; font-size: 1.2rem;
            text-transform: uppercase; transition: 0.1s;
        }

        .tab.active { background: var(--spice-purple); color: white; transform: translate(6px, 6px); box-shadow: none; }

        .card { background: white; border: 6px solid var(--main-black); padding: 30px; box-shadow: var(--brutal-shadow); margin-bottom: 30px; }

        .game-view { display: none; }
        .game-view.active { display: block; }

        .rps-arena { background: var(--spice-lime); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 30px; border: 6px solid black; margin-top: 20px; }

        .choice-btn { background: white; border: 4px solid black; font-size: 4rem; padding: 20px; cursor: pointer; box-shadow: var(--small-shadow); transition: 0.1s; }
        .choice-btn:hover { background: var(--spice-blue); }
        .choice-btn:active { transform: translate(4px, 4px); box-shadow: none; }

        .power-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .power-btn { background: white; border: 6px solid black; padding: 20px 10px; text-align: center; box-shadow: var(--brutal-shadow); cursor: pointer; transition: 0.1s; }
        .power-btn:hover { background: var(--spice-red); color: white; }

        .carnage-trigger { width: 100%; background: white; border: 6px solid black; padding: 25px; font-size: 2rem; cursor: pointer; box-shadow: var(--brutal-shadow); margin-top: 20px; text-transform: uppercase; }

        #carnage-list { display: none; background: white; border: 6px solid black; margin-top: 10px; padding: 20px; box-shadow: var(--brutal-shadow); }

        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 6px solid black; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 2px solid black; font-family: monospace; font-weight: bold; }

        .degen-input { width: 100%; padding: 15px; border: 4px solid black; font-size: 1.2rem; outline: none; margin: 10px 0; background: white; }
        .degen-input:focus { background: var(--spice-yellow); }

        .label { background: black; color: white; padding: 4px 10px; font-size: 0.8rem; display: inline-block; }
        
        .custom-stake-box { display: flex; gap: 10px; align-items: center; }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">DEGEN<br>DUEL</div>
        <div class="balance-box" id="auth-btn" onclick="handleAuth()">CONNECT WALLET</div>
    </header>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('rps-view', this)">🪨 ROCK-PAPER-SCISSORS</button>
        <button class="tab" onclick="switchTab('flip-view', this)">🎲 50/50 DOUBLE</button>
    </div>

    <div id="rps-view" class="game-view active">
        <div class="card">
            <span class="label">SET THE STAGE</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                <div>
                    <p style="font-size: 0.8rem;">OPPONENT ADDRESS</p>
                    <input type="text" class="degen-input" id="rps-user" placeholder="0x...">
                </div>
                <div>
                    <p style="font-size: 0.8rem;">DUEL STAKE (USDC)</p>
                    <input type="number" class="degen-input" id="rps-stake" placeholder="0.00" oninput="updatePotDisplay()">
                </div>
            </div>
        </div>

        <div class="rps-arena">
            <div id="rps-pot-display" style="grid-column: span 3; text-align: center; background: black; color: white; padding: 10px; margin-bottom: 10px;">
                PRIZE POT: 0.00 USDC (5% FEE)
            </div>
            <button class="choice-btn" onclick="playRPS('ROCK')">🪨</button>
            <button class="choice-btn" onclick="playRPS('PAPER')">📄</button>
            <button class="choice-btn" onclick="playRPS('SCISSORS')">✂️</button>
        </div>
    </div>

    <div id="flip-view" class="game-view">
        <div class="card" style="background: var(--spice-purple); color: white; border-radius: 0;">
            <h2 style="font-size: 3rem; letter-spacing: -2px;">50/50 FLIP</h2>
            <p id="match-status" class="blink">CHECKING FOR OPEN MATCHES...</p>
            
            <div class="power-grid" id="power-grid">
                <div class="power-btn" id="btn-1" style="color: black;" onclick="enterFlip(1)">$1</div>
                <div class="power-btn" id="btn-10" style="color: black;" onclick="enterFlip(10)">$10</div>
                <div class="power-btn" id="btn-100" style="color: black;" onclick="enterFlip(100)">$100</div>
                <div class="power-btn" id="btn-1000" style="color: black;" onclick="enterFlip(1000)">$1K</div>
            </div>
        </div>

        <div id="waiting-area" class="card" style="display:none; text-align: center; border-style: dashed; background: #fff5f5;">
            <h2 id="wait-msg" style="color: var(--spice-red); font-size: 1.5rem;">TRANSACTION PENDING...</h2>
        </div>
    </div>

    <button class="carnage-trigger" onclick="toggleCarnage()">View Recent Carnage ↓</button>
    <div id="carnage-list">
        <table>
            <thead><tr><th>GAME</th><th>WINNER</th><th>POT</th></tr></thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- CONTRACT CONFIG ---
    const DEGEN_ADDRESS = "YOUR_DEPLOYED_CONTRACT_ADDRESS";
    const USDC_ADDRESS = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"; // Base USDC
    const ABI = [
        "function flipWaitingRoom(uint256) view returns (address)",
        "function enterFiftyFifty(uint256 amount) external",
        "function createRPSDuel(address _opponent, uint256 _stake, bytes32 _moveHash) external"
    ];

    // --- INITIALIZE PRIVY ---
    const privy = new Privy.PrivyClient({
        appId: 'cl...your_id', // GET THIS FROM dashboard.privy.io
    });

    async function handleAuth() {
        if (!privy.authenticated) {
            await privy.login();
            location.reload();
        }
    }

    // --- LOGIC: CHECK IF SOMEONE STAKED ---
    async function checkWaitingMatches() {
        const provider = new ethers.providers.JsonRpcProvider("https://mainnet.base.org");
        const contract = new ethers.Contract(DEGEN_ADDRESS, ABI, provider);
        
        const stakes = [1, 10, 100, 1000];
        
        for (let s of stakes) {
            // USDC has 6 decimals, so $10 is 10000000
            const amountInUnits = ethers.utils.parseUnits(s.toString(), 6);
            const waitingPlayer = await contract.flipWaitingRoom(amountInUnits);
            
            const btn = document.getElementById(`btn-${s}`);
            if (waitingPlayer !== "0x0000000000000000000000000000000000000000") {
                // SOMEONE IS WAITING! Highlight the button lime green
                btn.style.background = "var(--spice-lime)";
                btn.innerHTML = `<h2 style="font-size:1.2rem;">JOIN $${s}</h2><span style="font-size:0.6rem;">MATCH READY!</span>`;
            } else {
                btn.style.background = "white";
                btn.innerHTML = `<h2 style="font-size:1.5rem;">$${s}</h2>`;
            }
        }
        document.getElementById('match-status').innerText = "LIVE MATCHES HIGHLIGHTED IN LIME";
    }

    // Run check every 10 seconds
    setInterval(checkWaitingMatches, 10000);
    window.onload = checkWaitingMatches;

    // --- REMAINING UI FUNCTIONS ---
    function switchTab(viewId, el) {
        document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    function toggleCarnage() {
        const list = document.getElementById('carnage-list');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    async function enterFlip(amt) {
        if (!privy.authenticated) return alert("LOG IN FIRST");
        document.getElementById('waiting-area').style.display = 'block';
        // Here we would trigger the ethers.js contract.enterFiftyFifty(amt)
    }

    function updatePotDisplay() {
        const stake = document.getElementById('rps-stake').value || 0;
        const netPot = (stake * 2 * 0.95).toFixed(2);
        document.getElementById('rps-pot-display').innerText = `PRIZE POT: ${netPot} USDC (5% FEE)`;
    }
</script>
</body>
</html>
