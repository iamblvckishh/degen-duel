<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN DUEL | THE ARENA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --black: #000000; --lime: #00FF19; --yellow: #FFFF00;
            --shadow: 8px 8px 0px 0px var(--black);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 440px; padding: 20px; position: relative; }
        .card { background: #fff; border: 4px solid var(--black); padding: 30px; box-shadow: var(--shadow); display: none; }
        .card.active { display: block; }
        h1 { font-size: 2.2rem; letter-spacing: -2px; margin-bottom: 20px; line-height: 0.9; }
        .stake-option { display: flex; justify-content: space-between; align-items: center; border: 4px solid var(--black); padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.1s; background: #fff; }
        .stake-option:hover { background: var(--lime); transform: translate(-2px, -2px); box-shadow: 4px 4px 0px 0px var(--black); }
        .waiting-count { font-size: 0.7rem; background: var(--black); color: #fff; padding: 2px 6px; }
        input { width: 100%; padding: 15px; border: 4px solid var(--black); margin-bottom: 15px; font-size: 1rem; outline: none; }
        .btn { width: 100%; padding: 15px; border: 4px solid var(--black); background: var(--yellow); font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px 0px var(--black); margin-bottom: 10px; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .back-link { font-size: 0.7rem; text-decoration: underline; cursor: pointer; display: block; text-align: center; margin-top: 10px; }
        #profile-trigger { position: fixed; top: 20px; right: 20px; border: 3px solid var(--black); padding: 8px 12px; background: var(--lime); cursor: pointer; font-size: 0.7rem; box-shadow: 4px 4px 0px 0px var(--black); display: none; }
        .radar-box { background: #000; color: var(--lime); padding: 15px; font-size: 0.6rem; word-break: break-all; margin-bottom: 10px; cursor: pointer; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .blinking { animation: blink 1s infinite; }
    </style>
</head>
<body>

<div id="profile-trigger" onclick="toggleProfile()">PROFILE</div>

<div class="container">
    <div class="card active" id="step-stake">
        <h1>STAKE AMOUNT</h1>
        <div class="stake-option" onclick="selectStake(1)"><span>$1 USDC</span> <span class="waiting-count">ACTIVE</span></div>
        <div class="stake-option" onclick="selectStake(10)"><span>$10 USDC</span> <span class="waiting-count">ACTIVE</span></div>
        <div class="stake-option" onclick="selectStake(100)"><span>$100 USDC</span> <span class="waiting-count">QUIET</span></div>
        <div class="stake-option" onclick="selectStake(1000)"><span>$1K USDC</span> <span class="waiting-count">ELITE</span></div>
    </div>

    <div class="card" id="step-login">
        <h1>IDENTIFY</h1>
        <input type="text" id="wallet-input" placeholder="0x... OR .ETH">
        <button class="btn" onclick="doLogin()">ENTER ARENA</button>
        <span class="back-link" onclick="showStep('step-stake')">BACK</span>
    </div>

    <div class="card" id="step-wallet">
        <h1>SENDER?</h1>
        <button class="btn" id="login-wallet-btn" onclick="setSender('login')">USE LOGIN WALLET</button>
        <p style="text-align:center; font-size:0.8rem; margin:10px 0;">-- OR --</p>
        <input type="text" id="alt-wallet" placeholder="OTHER ADDRESS">
        <button class="btn" style="background:#fff" onclick="setSender('alt')">USE THIS</button>
    </div>

    <div class="card" id="step-reveal">
        <h1 id="final-stake">DUEL</h1>
        <p style="font-size:0.7rem; margin-bottom:5px;">SENDER: <span id="display-sender" style="color:blue"></span></p>
        <p style="font-size:0.7rem; margin-bottom:10px;">TARGET ARENA:</p>
        <div class="radar-box" onclick="copyAddr()">0xFfa785f3D1DA528daDC56Ad899BA3c4A136FDF28</div>
        <p class="blinking" style="text-align:center; font-size:0.7rem;">ARENA RADAR ACTIVE...</p>
    </div>

    <div class="card" id="modal-profile" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:100;">
        <h1>STATS</h1>
        <p id="p-addr" style="font-size:0.6rem; margin-bottom:15px;"></p>
        <div style="border:4px solid #000; padding:10px; margin-bottom:10px;">WINS: <span id="p-wins">0</span></div>
        <div style="border:4px solid #000; padding:10px; margin-bottom:10px;">LOSS: <span id="p-loss">0</span></div>
        <button class="btn" onclick="toggleProfile()">CLOSE</button>
    </div>
</div>

<script>
    const ARENA = "0xFfa785f3D1DA528daDC56Ad899BA3c4A136FDF28";
    const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";
    const RPC = "https://rpc.ankr.com/eth_sepolia";
    const provider = new ethers.providers.JsonRpcProvider(RPC);

    let currentStake = 0;
    let userLogin = "";
    let senderAddr = "";

    function showStep(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function selectStake(amt) { currentStake = amt; showStep('step-login'); }

    async function doLogin() {
        const input = document.getElementById('wallet-input').value.trim();
        if(!input) return;
        try {
            // Simple check: if ends in .eth, would need mainnet provider to resolve
            userLogin = input; // For Sepolia dev, assuming address is pasted
            document.getElementById('login-wallet-btn').innerText = `USE ${userLogin.substring(0,6)}...`;
            document.getElementById('profile-trigger').style.display = 'block';
            showStep('step-wallet');
        } catch(e) { alert("ERROR"); }
    }

    function setSender(type) {
        senderAddr = (type === 'login') ? userLogin : document.getElementById('alt-wallet').value.trim();
        document.getElementById('final-stake').innerText = `$${currentStake} DUEL`;
        document.getElementById('display-sender').innerText = senderAddr.substring(0,10)+"...";
        showStep('step-reveal');
        startRadar();
    }

    function startRadar() {
        const usdcContract = new ethers.Contract(USDC, ["event Transfer(address indexed from, address indexed to, uint256 value)"], provider);
        const filter = usdcContract.filters.Transfer(senderAddr, ARENA);
        
        usdcContract.once(filter, (from, to, value) => {
            alert("USDC DETECTED! ENTERING LOBBY...");
            listenForResult();
        });
    }

    function listenForResult() {
        const arenaContract = new ethers.Contract(ARENA, ["event FlipResult(address indexed winner, address indexed loser, uint256 prize)"], provider);
        arenaContract.on("FlipResult", (winner, loser, prize) => {
            if (winner.toLowerCase() === senderAddr.toLowerCase()) {
                alert("VICTORY! BOUNTY SENT TO WALLET.");
                location.reload();
            } else if (loser.toLowerCase() === senderAddr.toLowerCase()) {
                alert("DEFEATED.");
                location.reload();
            }
        });
    }

    function toggleProfile() {
        const m = document.getElementById('modal-profile');
        m.classList.toggle('active');
        document.getElementById('p-addr').innerText = userLogin;
    }

    function copyAddr() { navigator.clipboard.writeText(ARENA); alert("COPIED!"); }
</script>
</body>
</html>
