<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DegenDuel | Shape Sepolia</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" type="application/javascript"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --bg-dark: #050505;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .container {
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h1 { color: var(--neon-green); letter-spacing: 4px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.8rem; margin-bottom: 30px; }

        .btn {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin: 10px 0;
            border-radius: 8px;
        }

        .btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .stake-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        #status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            min-height: 40px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DEGEN DUEL</h1>
        <div class="subtitle">SHAPE SEPOLIA NETWORK</div>

        <button id="connectBtn" class="btn" onclick="connect()">CONNECT WALLET</button>

        <div id="gameUI" class="hidden">
            <p id="walletAddress" style="font-size: 0.7rem; color: var(--neon-green);"></p>
            
            <div class="stake-grid">
                <button class="btn" onclick="stake(1)">STAKE $1</button>
                <button class="btn" onclick="stake(10)">STAKE $10</button>
                <button class="btn" onclick="stake(50)">STAKE $50</button>
                <button class="btn" onclick="stake(100)">STAKE $100</button>
            </div>
        </div>

        <div id="status">Waiting for connection...</div>
    </div>

    <script>
        // --- DATA FROM YOUR DEPLOYMENT ---
        const CONTRACT_ADDRESS = "0x7e26bf8670Df62e454744767CBF71261a14F9175"; 
        const USDC_ADDRESS = "0x3233306B70591f7d54402662054D69B0C39C9b5e";

        const ABI = [
            "function enterFiftyFifty(uint256 _amount) external",
            "event FlipResult(address indexed winner, address indexed loser, uint256 prize)"
        ];

        const USDC_ABI = [
            "function approve(address spender, uint256 amount) returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)"
        ];

        let signer;
        let duelContract;
        let usdcContract;

        async function connect() {
            if (!window.ethereum) return alert("Please install MetaMask");
            
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            
            document.getElementById('walletAddress').innerText = "CONNECTED: " + addr;
            document.getElementById('connectBtn').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('status').innerText = "Ready to duel.";

            // Initialize Contracts
            duelContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);

            // Listen for Flip Results
            duelContract.on("FlipResult", (winner, loser, prize) => {
                if(winner.toLowerCase() === addr.toLowerCase()) {
                    document.getElementById('status').innerHTML = "<span style='color:var(--neon-green)'>YOU WON! PRIZE SENT.</span>";
                } else {
                    document.getElementById('status').innerHTML = "<span style='color:red'>YOU LOST. TRY AGAIN.</span>";
                }
            });
        }

        async function stake(amount) {
            try {
                const amountInUnits = ethers.utils.parseUnits(amount.toString(), 6); // USDC has 6 decimals
                const userAddr = await signer.getAddress();

                document.getElementById('status').innerText = "Checking USDC allowance...";

                // 1. Check if we need to Approve USDC
                const allowance = await usdcContract.allowance(userAddr, CONTRACT_ADDRESS);
                if (allowance.lt(amountInUnits)) {
                    document.getElementById('status').innerText = "Approve USDC in your wallet...";
                    const approveTx = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                    await approveTx.wait();
                    document.getElementById('status').innerText = "USDC Approved!";
                }

                // 2. Execute the Duel Stake
                document.getElementById('status').innerText = `Confirming $${amount} Stake...`;
                const tx = await duelContract.enterFiftyFifty(amountInUnits, {
                    gasLimit: 300000 // Added manual gas limit for Shape L2 stability
                });
                
                document.getElementById('status').innerText = "Transaction pending...";
                await tx.wait();
                
                document.getElementById('status').innerText = "STAKED! Waiting for opponent...";

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Error: " + (err.data?.message || err.message).substring(0, 40);
            }
        }
    </script>
</body>
</html>
