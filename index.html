<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN P2P | SCAN & PLAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #000; --lime: #00FF19; --yellow: #FFFF00; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); padding: 20px; color: var(--white); }
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: var(--white); border: 5px solid var(--lime); padding: 25px; color: #000; box-shadow: 8px 8px 0px var(--lime); margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 4px solid #000; font-size: 0.9rem; margin-bottom: 10px; }
        .btn { background: var(--yellow); border: 4px solid #000; padding: 15px; cursor: pointer; width: 100%; box-shadow: 4px 4px 0px #000; margin-bottom: 10px; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .luck-meter { width: 100%; height: 25px; border: 3px solid #000; background: #ddd; margin: 10px 0; position: relative; }
        #luck-bar { height: 100%; background: var(--lime); width: 0%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .lobby-screen { display: none; text-align: center; padding: 40px 20px; border: 6px solid var(--lime); background: #111; }
        .copy-box { background: #000; color: var(--lime); padding: 10px; font-size: 0.7rem; word-break: break-all; margin: 10px 0; cursor: pointer; border: 2px dashed var(--lime); }
    </style>
</head>
<body>

<div class="container" id="main-app">
    <div class="card" id="search-ui">
        <h1 style="font-size: 2.5rem; line-height: 0.9; margin-bottom: 15px;">DEGEN<br>SCAN</h1>
        <input type="text" id="address-input" placeholder="PASTE ADDRESS...">
        <button class="btn" onclick="scanPlayer()">SCAN STATS</button>
    </div>

    <div class="card" id="stats-ui" style="display: none;">
        <p style="font-size: 0.7rem; color: #666;" id="player-addr"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <div style="border: 3px solid #000; padding: 10px;">WINS: <span id="w-count">0</span></div>
            <div style="border: 3px solid #000; padding: 10px;">LOSS: <span id="l-count">0</span></div>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem;">LUCK METER</p>
        <div class="luck-meter"><div id="luck-bar"></div></div>

        <hr style="margin: 20px 0; border: 1px solid #000;">
        <h3 style="margin-bottom: 10px;">SELECT STAKE</h3>
        <p style="font-size: 0.6rem; color: red; margin-bottom: 10px;">WARNING: ONLY SEND MULTIPLES OF 10 ($1, $10, $100...)</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="prepareDeposit(1)">$1</button>
            <button class="btn" onclick="prepareDeposit(10)">$10</button>
            <button class="btn" onclick="prepareDeposit(100)">$100</button>
            <button class="btn" onclick="prepareDeposit(1000)">$1K</button>
        </div>
    </div>

    <div class="card" id="deposit-ui" style="display: none;">
        <h2 id="amt-text">SEND $10 USDC</h2>
        <p style="font-size: 0.7rem; margin-bottom: 10px;">TO THIS CONTRACT ADDRESS:</p>
        <div class="copy-box" onclick="copyAddr()">0xFfa785f3D1DA528daDC56Ad899BA3c4A136FDF28</div>
        <p style="font-size: 0.6rem;">SITE IS WATCHING... DO NOT REFRESH.</p>
    </div>

    <div class="lobby-screen" id="lobby-ui">
        <h1 id="status-msg" style="color: var(--lime); font-size: 2rem;">WAITING FOR MATCH...</h1>
        <div id="loader" style="margin: 20px 0;">⏳</div>
    </div>
</div>

<script>
    const CONTRACT = "0xFfa785f3D1DA528daDC56Ad899BA3c4A136FDF28";
    // Using a Public Sepolia RPC (You can replace with your Alchemy/Infura link)
    const provider = new ethers.providers.JsonRpcProvider("https://rpc.ankr.com/eth_sepolia");

    function scanPlayer() {
        const addr = document.getElementById('address-input').value;
        if (addr.length < 40) return alert("Invalid Address");
        
        document.getElementById('player-addr').innerText = addr;
        document.getElementById('search-ui').style.display = 'none';
        document.getElementById('stats-ui').style.display = 'block';

        // Mock Luck Calculation (In real app, fetch from FlipResult history)
        const wins = Math.floor(Math.random() * 20);
        const loss = Math.floor(Math.random() * 20);
        document.getElementById('w-count').innerText = wins;
        document.getElementById('l-count').innerText = loss;
        document.getElementById('luck-bar').style.width = ((wins / (wins+loss)) * 100) + "%";
    }

    function prepareDeposit(amt) {
        document.getElementById('amt-text').innerText = `SEND $${amt} USDC`;
        document.getElementById('stats-ui').style.display = 'none';
        document.getElementById('deposit-ui').style.display = 'block';
        
        // Start watching for the transaction...
        fakeWatch(); 
    }

    function fakeWatch() {
        // This simulates the radar finding the money
        setTimeout(() => {
            document.getElementById('deposit-ui').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'block';
            
            // Simulating a Win after 5 seconds
            setTimeout(() => {
                document.getElementById('status-msg').innerText = "YOU WIN!";
                document.getElementById('status-msg').style.color = "var(--lime)";
                document.getElementById('lobby-ui').style.borderColor = "var(--lime)";
                document.getElementById('loader').innerHTML = `<button class="btn" onclick="location.reload()">CLAIM & PLAY AGAIN</button>`;
            }, 5000);
        }, 4000);
    }

    function copyAddr() {
        navigator.clipboard.writeText(CONTRACT);
        alert("COPIED!");
    }
</script>
</body>
</html>
