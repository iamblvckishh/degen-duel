<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEGEN FLIP | SEPOLIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg: #000000; --white: #ffffff; --black: #000000; 
            --lime: #00FF19; --yellow: #FFFF00;
            --shadow: 8px 8px 0px 0px var(--lime);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background-color: var(--bg); padding: 40px; color: var(--white); }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--white); border: 5px solid var(--lime); padding: 30px; box-shadow: var(--shadow); margin-bottom: 30px; color: var(--black); }
        .btn { background: var(--yellow); border: 4px solid var(--black); padding: 15px; cursor: pointer; width: 100%; font-size: 1.2rem; box-shadow: 4px 4px 0px 0px var(--black); margin-bottom: 10px; transition: 0.1s; text-transform: uppercase; }
        .btn:active { transform: translate(2px, 2px); box-shadow: none; }
        .power-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        #status-log { background: #111; color: var(--lime); padding: 15px; font-family: monospace; font-size: 0.9rem; height: 100px; overflow-y: auto; border: 3px solid var(--lime); line-height: 1.5; }
        .lobby-overlay { display: none; background: var(--lime); color: var(--black); padding: 20px; border: 4px solid var(--black); margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1 style="font-size: 3rem; letter-spacing: -2px;">DEGEN FLIP</h1>
        <p style="font-size: 0.8rem; margin-bottom: 20px;">NETWORK: SEPOLIA</p>
        <button class="btn" id="connect-btn" onclick="connect()">CONNECT WALLET</button>
    </div>

    <div class="card" id="game-ui" style="opacity: 0.3; pointer-events: none;">
        <h2 style="text-decoration: underline;">CHOOSE STAKE</h2>
        <div class="power-grid">
            <button class="btn" onclick="play(1)">$1 USDC</button>
            <button class="btn" onclick="play(10)">$10 USDC</button>
            <button class="btn" onclick="play(100)">$100 USDC</button>
            <button class="btn" onclick="play(1000)">$1K USDC</button>
        </div>

        <div id="lobby-view" class="lobby-overlay">
            <h3 id="lobby-text">IN LOBBY...</h3>
            <button class="btn" style="background: var(--white); margin-top: 15px;" onclick="cancel()">QUIT & REFUND</button>
        </div>
    </div>

    <div id="status-log">>> READY. CONNECT TO START.</div>
</div>

<script>
    // --- UPDATED ADDRESS ---
    const CONTRACT_ADDRESS = "0xFfa785f3D1DA528daDC56Ad899BA3c4A136FDF28".toLowerCase(); 
    const USDC_ADDRESS = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238".toLowerCase();

    let signer, duelContract, usdcContract, currentStakeRaw;

    async function connect() {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        
        const { chainId } = await provider.getNetwork();
        if (chainId !== 11155111) {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0xaa36a7' }], 
            });
            location.reload();
            return;
        }

        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const addr = await signer.getAddress();
        
        document.getElementById('connect-btn').innerText = addr.substring(0,6) + "...";
        document.getElementById('connect-btn').style.background = "#00FF19";
        document.getElementById('game-ui').style.opacity = "1";
        document.getElementById('game-ui').style.pointerEvents = "auto";
        
        duelContract = new ethers.Contract(CONTRACT_ADDRESS, [
            "function enterFiftyFifty(uint256 _amount) external",
            "function cancelFlip(uint256 _amount) external"
        ], signer);

        usdcContract = new ethers.Contract(USDC_ADDRESS, [
            "function approve(address s, uint256 a) returns (bool)",
            "function allowance(address o, address s) view returns (uint256)"
        ], signer);
        
        updateLog("CONNECTED TO SEPOLIA");
    }

    async function play(amount) {
        if (!signer) return alert("Connect first");
        try {
            currentStakeRaw = ethers.utils.parseUnits(amount.toString(), 6);
            updateLog("CHECKING ALLOWANCE...");
            
            const addr = await signer.getAddress();
            const allowance = await usdcContract.allowance(addr, CONTRACT_ADDRESS);
            
            if (allowance.lt(currentStakeRaw)) {
                updateLog("APPROVING USDC...");
                const txA = await usdcContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
                await txA.wait(); // Fixed: waits for confirmation before moving on
                updateLog("APPROVED.");
            }

            updateLog("ENTERING LOBBY...");
            const txS = await duelContract.enterFiftyFifty(currentStakeRaw);
            await txS.wait();
            
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('lobby-text').innerText = "IN $" + amount + " LOBBY...";
            updateLog("IN LOBBY. WAITING FOR MATCH.");
        } catch (e) {
            updateLog("!! ERROR: " + (e.reason || "FAILED"));
            console.error(e);
        }
    }

    async function cancel() {
        if (!currentStakeRaw) return;
        try {
            updateLog("REFUNDING...");
            const tx = await duelContract.cancelFlip(currentStakeRaw);
            await tx.wait();
            document.getElementById('lobby-view').style.display = 'none';
            updateLog("REFUNDED.");
        } catch (e) {
            updateLog("CANCEL FAILED");
        }
    }

    function updateLog(msg) { document.getElementById('status-log').innerText = ">> " + msg; }
</script>
</body>
</html>
